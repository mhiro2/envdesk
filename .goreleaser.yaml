version: 2

builds:
  - main: ./cmd/envdesk
    binary: envdesk
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/mhiro2/envdesk/internal/cli.version={{.Version}}
      - -X github.com/mhiro2/envdesk/internal/cli.commit={{.Commit}}
      - -X github.com/mhiro2/envdesk/internal/cli.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

sboms:
  - artifacts: archive

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: envdesk
    binaries:
      - envdesk
    description: Local-first CLI for managing encrypted env files across services and environments
    homepage: https://github.com/mhiro2/envdesk
    url:
      verified: github.com/mhiro2/envdesk/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/envdesk"]
          end
    repository:
      owner: mhiro2
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  github:
    owner: mhiro2
    name: envdesk
  draft: false
  prerelease: auto
